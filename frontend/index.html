<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flashcards</title>
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body>
    <header>
      <nav>
        <a href="#" class="brand-logo"> Flashcards </a>
      </nav>
    </header>
    <main class="container">
      <div class="page-header">
        <h1 class="page-title">Welcome back</h1>
        <p class="text-secondary">Log in to your account</p>
      </div>
      <form id="login-form">
        <div class="form-child">
          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="email"
              name="email"
              id="email"
              placeholder="example@example.com"
              required
            />
          </div>
          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required />
          </div>
          <p id="login-fail" class="error-message">Wrong email or password</p>
        </div>
        <div class="form-child">
          <button type="submit" class="button-primary">Log in</button>
          <button type="button" class="button-secondary">Create Account</button>
        </div>
      </form>
    </main>
  </body>
  <script src="js/login.js"></script>
</html>
