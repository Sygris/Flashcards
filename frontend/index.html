<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Flashcards - Login</title>
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>
    <main class="container">
      <div class="container--column left-side">
        <a href="#" class="logo">
          Flashcards
        </a>
        <form class="container--form">
          <div class="container--form__fields">
            <label for="email">E-mail</label>
            <input type="email" name="email" placeholder="example@gmail.com" required>
          </div>

          <div class="container--form__fields">
            <label for="password">Password</label>
            <input type="password" name="password" placeholder="* * * * * * * *" required>
          </div>
          
          <button type="submit" class="container--form__submit">Log in</button>
          
          <!-- <div> -->
          <!--   <input type="checkbox" name="remember_me" value="remember"> Remember me -->
          <!--   <a href="#">Forgot password?</a> -->
          <!-- </div> -->
        </form>
      </div>
      <div class="right-side">
        <h2 class="title">Hello, Welcome!</h2>
        <p>Don't have an account?</p>
      </div>
    </main>
  </body>
</html>
